<section id="coding-profiles" class="py-16 md:py-24 bg-card">
  <div class="container mx-auto px-4">
    <h2 class="text-3xl font-headline font-bold text-center mb-12">Coding & Competition Profiles</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div *ngFor="let profile of profiles" class="rounded-xl bg-white shadow p-6 flex flex-col items-center text-center hover:shadow-lg transition-all duration-300">
        <img [src]="profile.icon" [alt]="profile.platform + ' icon'" class="w-14 h-14 mb-4 object-contain" *ngIf="profile.icon">
        <h3 class="font-headline text-xl font-semibold mb-2">{{ profile.platform }}</h3>
        <div class="text-green-700 font-medium mb-2">{{ profile.stats }}</div>
        <p class="text-muted-foreground mb-4">{{ profile.description }}</p>
        <a [href]="profile.url" target="_blank" rel="noopener" class="text-primary font-semibold hover:underline">View Profile</a>
      </div>
    </div>
  </div>
</section>
